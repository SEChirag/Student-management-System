<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            min-height:100vh;
        }

        /* LOGIN */

        #loginPage{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:350px;
            background:#1e293b;
            padding:30px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        .login-card h1{
            text-align:center;
            margin-bottom:25px;
            color:#38bdf8;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:12px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
            outline:none;
        }

        button{
            border:none;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.03);
        }

        .login-btn{
            width:100%;
            padding:12px;
            margin-top:20px;
            border-radius:10px;
            background:#38bdf8;
            font-weight:bold;
        }

        #loginError{
            color:red;
            margin-top:15px;
            text-align:center;
        }

        /* MAIN PAGE */

        #mainPage{
            display:none;
        }

        .container{
            display:flex;
            min-height:100vh;
        }

        /* SIDEBAR */

        .sidebar{
            width:250px;
            background:#1e293b;
            padding:25px;
        }

        .sidebar h2{
            color:#38bdf8;
            margin-bottom:30px;
        }

        .menu-btn{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border-radius:12px;
            background:#334155;
            color:white;
            font-weight:bold;
        }

        .logout-btn{
            background:red;
            color:white;
        }

        /* CONTENT */

        .content{
            flex:1;
            padding:30px;
        }

        .welcome{
            margin-bottom:25px;
        }

        .card{
            background:#1e293b;
            padding:25px;
            border-radius:18px;
            display:none;
            animation:fade 0.3s ease;
        }

        @keyframes fade{
            from{
                opacity:0;
                transform:translateY(10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h3{
            margin-bottom:20px;
            color:#38bdf8;
        }

        .action-btn{
            margin-top:15px;
            padding:12px 20px;
            border-radius:10px;
            background:#38bdf8;
            font-weight:bold;
        }

        .delete-btn{
            background:red;
            color:white;
            padding:8px 14px;
            border-radius:8px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th, td{
            padding:15px;
            border-bottom:1px solid #475569;
            text-align:center;
        }

        th{
            color:#38bdf8;
        }

        .search-box{
            display:flex;
            gap:10px;
        }

        #singleStudent{
            margin-top:20px;
        }

        select{
            padding:12px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
            width:250px;
        }

    </style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

    <div class="login-card">

        <h1>Login</h1>

        <input type="text"
               id="username"
               placeholder="Username">

        <input type="password"
               id="password"
               placeholder="Password">

        <button class="login-btn"
                onclick="login()">

            Login

        </button>

        <p id="loginError"></p>

    </div>

</div>

<!-- MAIN PAGE -->

<div id="mainPage">

    <div class="container">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <h2>Dashboard</h2>

            <button class="menu-btn"
                    onclick="showSection('addSection')">

                Add Student

            </button>

            <button class="menu-btn"
                    onclick="showSection('searchSection')">

                Search Student

            </button>

            <button class="menu-btn"
                    onclick="showSection('viewSection')">

                View Students

            </button>

            <button class="menu-btn"
                    onclick="showSection('analyticsSection')">

                Analytics

            </button>

            <button class="menu-btn logout-btn"
                    onclick="logout()">

                Logout

            </button>

        </div>

        <!-- CONTENT -->

        <div class="content">

            <div class="welcome">

                <h1>Welcome Admin 👋</h1>

                <p>Manage your students easily.</p>

            </div>

            <!-- ADD -->

            <div class="card"
                 id="addSection">

                <h3>Add Student</h3>

                <input type="text"
                       id="name"
                       placeholder="Enter Name">

                <input type="number"
                       id="marks"
                       placeholder="Enter Marks">

                <input type="text"
                       id="section"
                       placeholder="Enter Section">

                <input type="text"
                       id="result"
                       placeholder="pass / fail">

                <button class="action-btn"
                        onclick="addStudent()">

                    Add Student

                </button>

            </div>

            <!-- SEARCH -->

            <div class="card"
                 id="searchSection">

                <h3>Search Student</h3>

                <div class="search-box">

                    <input type="number"
                           id="searchId"
                           placeholder="Enter Student ID">

                    <button class="action-btn"
                            onclick="getStudentById()">

                        Search

                    </button>

                </div>

                <div id="singleStudent"></div>

            </div>

            <!-- VIEW -->

            <div class="card"
                 id="viewSection">

                <h3>All Students</h3>

                <button class="action-btn"
                        onclick="getStudents()">

                    Refresh Students

                </button>

                <table>

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Marks</th>
                        <th>Section</th>
                        <th>Result</th>
                        <th>Action</th>
                    </tr>

                    </thead>

                    <tbody id="studentTable"></tbody>

                </table>

            </div>

            <!-- ANALYTICS -->

            <div class="card"
                 id="analyticsSection">

                <h3>Student Analytics</h3>

                <div style="
                    display:flex;
                    gap:20px;
                    flex-wrap:wrap;
                    margin-bottom:20px;
                ">

                    <div style="
                        background:#334155;
                        padding:20px;
                        border-radius:15px;
                        flex:1;
                    ">

                        <h2 id="totalStudents">0</h2>
                        <p>Total Students</p>

                    </div>

                    <div style="
                        background:green;
                        padding:20px;
                        border-radius:15px;
                        flex:1;
                    ">

                        <h2 id="passedStudents">0</h2>
                        <p>Passed Students</p>

                    </div>

                    <div style="
                        background:red;
                        padding:20px;
                        border-radius:15px;
                        flex:1;
                    ">

                        <h2 id="failedStudents">0</h2>
                        <p>Failed Students</p>

                    </div>

                </div>

                <!-- FILTER -->

                <div style="margin-bottom:20px;">

                    <select id="filterSelect"
                            onchange="filterStudents()">

                        <option value="all">
                            All Students
                        </option>

                        <option value="pass">
                            Passed Students
                        </option>

                        <option value="fail">
                            Failed Students
                        </option>

                    </select>

                </div>

                <!-- CHART -->

                <div style="
                    background:#334155;
                    padding:20px;
                    border-radius:15px;
                ">

                    <canvas id="studentChart"
                            height="100"></canvas>

                </div>

                <!-- FILTER TABLE -->

                <table>

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Marks</th>
                        <th>Section</th>
                        <th>Result</th>
                    </tr>

                    </thead>

                    <tbody id="filterTable"></tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

    const BASE_URL =
        "http://localhost:8081/API";

    let allStudents = [];

    let chart;


    // LOGIN

    function login(){

        const username =
            document.getElementById("username").value;

        const password =
            document.getElementById("password").value;

        if(username === "admin"
            && password === "1234"){

            document.getElementById("loginPage")
                    .style.display = "none";

            document.getElementById("mainPage")
                    .style.display = "block";

        } else {

            document.getElementById("loginError")
                    .innerText =
                    "Invalid Username or Password";
        }
    }


    // LOGOUT

    function logout(){

        location.reload();
    }


    // SHOW SECTION

    function showSection(sectionId){

        const sections =
            document.querySelectorAll(".card");

        sections.forEach(section => {

            section.style.display = "none";
        });

        document.getElementById(sectionId)
                .style.display = "block";

        if(sectionId === "analyticsSection"){

            loadAnalytics();
        }
    }


    // CLEAR FORM

    function clearForm(){

        document.getElementById("name").value = "";

        document.getElementById("marks").value = "";

        document.getElementById("section").value = "";

        document.getElementById("result").value = "";
    }


    // ADD STUDENT

    async function addStudent(){

        const student = [{

            name:
                document.getElementById("name").value,

            marks:
                document.getElementById("marks").value,

            section:
                document.getElementById("section").value,

            result:
                document.getElementById("result").value

        }];

        const response =
            await fetch(`${BASE_URL}/add`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(student)
            });

        if(response.ok){

            alert("Student Added Successfully");

            clearForm();

        } else {

            alert("Failed To Add Student");
        }
    }


    // GET STUDENTS

    async function getStudents(){

        const response =
            await fetch(`${BASE_URL}/all`);

        const data =
            await response.json();

        let table = "";

        data.forEach(student => {

            table += `

            <tr>

                <td>${student.id}</td>

                <td>${student.name}</td>

                <td>${student.marks}</td>

                <td>${student.section}</td>

                <td>${student.result}</td>

                <td>

                    <button class="delete-btn"
                            onclick="deleteStudent(${student.id})">

                        Delete

                    </button>

                </td>

            </tr>
            `;
        });

        document.getElementById("studentTable")
                .innerHTML = table;
    }


    // DELETE STUDENT

    async function deleteStudent(id){

        const response =
            await fetch(
                `${BASE_URL}/delete/${id}`,
                {
                    method:"DELETE"
                });

        if(response.ok){

            alert("Student Deleted");

            getStudents();

        } else {

            alert("Delete Failed");
        }
    }


    // SEARCH STUDENT

    async function getStudentById(){

        const id =
            document.getElementById("searchId").value;

        const response =
            await fetch(`${BASE_URL}/${id}`);

        const box =
            document.getElementById("singleStudent");

        if(response.ok){

            const student =
                await response.json();

            box.innerHTML = `

                <div style="
                    background:#334155;
                    padding:20px;
                    border-radius:12px;
                    margin-top:20px;
                ">

                    <p><strong>ID:</strong> ${student.id}</p>

                    <p><strong>Name:</strong> ${student.name}</p>

                    <p><strong>Marks:</strong> ${student.marks}</p>

                    <p><strong>Section:</strong> ${student.section}</p>

                    <p><strong>Result:</strong> ${student.result}</p>

                </div>
            `;

        } else {

            box.innerHTML = `

                <div style="
                    background:red;
                    padding:15px;
                    border-radius:10px;
                    margin-top:20px;
                ">

                    Student Not Found

                </div>
            `;
        }
    }


    // ANALYTICS

    async function loadAnalytics(){

        const response =
            await fetch(`${BASE_URL}/all`);

        const data =
            await response.json();

        allStudents = data;

        const passed =
            data.filter(student =>
                student.result.toLowerCase() === "pass"
            );

        const failed =
            data.filter(student =>
                student.result.toLowerCase() === "fail"
            );

        document.getElementById("totalStudents")
                .innerText = data.length;

        document.getElementById("passedStudents")
                .innerText = passed.length;

        document.getElementById("failedStudents")
                .innerText = failed.length;

        createChart(passed.length, failed.length);

        renderFilterTable(data);
    }


    // CHART

    function createChart(passCount, failCount){

        const ctx =
            document.getElementById("studentChart");

        if(chart){
            chart.destroy();
        }

        chart = new Chart(ctx, {

            type:'bar',

            data:{
                labels:['Passed', 'Failed'],

                datasets:[{

                    label:'Students',

                    data:[passCount, failCount],

                    borderWidth:2
                }]
            },

            options:{
                responsive:true,

                scales:{
                    y:{
                        beginAtZero:true
                    }
                }
            }
        });
    }


    // FILTER

    function filterStudents(){

        const filter =
            document.getElementById("filterSelect").value;

        let filtered = allStudents;

        if(filter === "pass"){

            filtered =
                allStudents.filter(student =>
                    student.result.toLowerCase() === "pass"
                );
        }

        else if(filter === "fail"){

            filtered =
                allStudents.filter(student =>
                    student.result.toLowerCase() === "fail"
                );
        }

        renderFilterTable(filtered);
    }


    // FILTER TABLE

    function renderFilterTable(data){

        let table = "";

        data.forEach(student => {

            table += `

            <tr>

                <td>${student.id}</td>

                <td>${student.name}</td>

                <td>${student.marks}</td>

                <td>${student.section}</td>

                <td>${student.result}</td>

            </tr>
            `;
        });

        document.getElementById("filterTable")
                .innerHTML = table;
    }

</script>

</body>
</html>
